# Global Package Injections
spark.jars.packages               org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.postgresql:postgresql:42.7.3,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,ru.yandex.clickhouse:clickhouse-jdbc:0.3.2

# Global Iceberg Catalog & Extensions
spark.sql.extensions              org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.hive_prod       org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.hive_prod.type  hive
spark.sql.catalog.hive_prod.uri   thrift://hive-metastore:9083
spark.sql.warehouse.dir           hdfs://namenode:9000/user/hive/warehouse

# Global UI Proxy Settings
spark.ui.reverseProxy             true
spark.ui.reverseProxyUrl          http://localhost:8081
